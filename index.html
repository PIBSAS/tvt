<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IPTV Player PRO</title>

<style>
body { margin:0; background:black; overflow:hidden; }

video {
    position:absolute;
    width:100vw;
    height:100vh;
    object-fit:cover;
}

#ui {
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
}

#overlay {
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:6px;
    transition:.3s;
}

#logo {
    position:absolute;
    top:60px;
    left:20px;
    height:50px;
}

#loadBtn {
    position:absolute;
    top:20px;
    right:20px;
    z-index:10000;
    pointer-events:auto;
}

#list {
    position:absolute;
    right:0;
    top:0;
    width:80px;
    height:100%;
    background:rgba(0,0,0,0.8);
    overflow-y:auto;
    pointer-events:auto;
}

.channel {
    display:flex;
    justify-content:center;
    padding:10px;
    cursor:pointer;
}

.channel img {
    height:40px;
    max-width:60px;
}

.channel.active {
    background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<button id="loadBtn">Cargar lista</button>
<input type="file" id="fileInput" accept=".m3u" hidden>

<video id="videoA" muted playsinline></video>
<video id="videoB" muted playsinline style="display:none"></video>

<div id="ui">
    <div id="overlay">Esperando lista...</div>
    <img id="logo" style="display:none">
    <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>

// DOM
const videoA = document.getElementById("videoA");
const videoB = document.getElementById("videoB");

const loadBtn = document.getElementById("loadBtn");
const fileInput = document.getElementById("fileInput");
const overlay = document.getElementById("overlay");
const list = document.getElementById("list");
const logo = document.getElementById("logo");

// videos
let activeVideo = videoA;
let standbyVideo = videoB;

let hlsActive = null;
let hlsPreload = null;

// data
let channels = [];
let current = 0;
let preloadIndex = null;

// control
let direction = 1;
let triedChannels = new Set();

// botón cargar
loadBtn.onclick = () => fileInput.click();

fileInput.onchange = e => {
    let file = e.target.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e => {
        channels = [];
        parseM3U(e.target.result);

        if(!channels.length) return alert("Lista vacía");

        buildList();
        loadBtn.style.display = "none";
        overlay.innerText = "";

        let saved = localStorage.getItem("lastChannel");
        if(saved !== null) current = parseInt(saved);

        loadChannel(current);
    };
    reader.readAsText(file);
};

// parse M3U
function parseM3U(txt){
    let lines = txt.split("\n");
    for(let i=0;i<lines.length;i++){
        let l = lines[i].trim();
        if(l.startsWith("#EXTINF")){
            let name = l.split(",").pop().trim();
            let url = (lines[i+1]||"").trim();
            let logo = (l.match(/tvg-logo="([^"]+)"/)||[])[1];
            if(url.startsWith("http")){
                channels.push({name,url,logo});
            }
        }
    }
}

// lista
function buildList(){
    list.innerHTML = "";
    channels.forEach((ch,i)=>{
        let d = document.createElement("div");
        d.className = "channel";
        d.onclick = ()=>loadChannel(i,true);

        if(ch.logo){
            let img = document.createElement("img");
            img.src = ch.logo;
            d.appendChild(img);
        }
        list.appendChild(d);
    });
}

// PRELOAD REAL (🔥 clave)
function preloadChannel(index){
    if(index < 0) index = channels.length - 1;
    if(index >= channels.length) index = 0;

    if(preloadIndex === index) return;
    preloadIndex = index;

    if(hlsPreload) hlsPreload.destroy();

    let ch = channels[index];

    hlsPreload = new Hls({
        maxBufferLength: 5,
        maxMaxBufferLength: 10
    });

    hlsPreload.loadSource(ch.url);
    hlsPreload.attachMedia(standbyVideo);

    standbyVideo.muted = true;
    standbyVideo.play().catch(()=>{}); // 🔥 ESTO HACE LA MAGIA

    console.log("⚡ Precargando:", ch.name);
}

// LOAD rápido
function loadChannel(index){
    if(index < 0) index = channels.length - 1;
    if(index >= channels.length) index = 0;

    current = index;
    localStorage.setItem("lastChannel", current);

    let ch = channels[index];
    overlay.innerText = ch.name;
    updateUI();

    // USAR PRELOAD
    if(preloadIndex === index && hlsPreload){
        console.log("🚀 usando precarga");

        if(hlsActive) hlsActive.destroy();

        hlsActive = hlsPreload;
        hlsPreload = null;
        preloadIndex = null;

        swapVideos();

        activeVideo.muted = false;
        activeVideo.play().catch(()=>{});

        preloadChannel(current + direction);
        return;
    }

    // NORMAL
    if(hlsActive) hlsActive.destroy();

    hlsActive = new Hls({
        maxBufferLength: 5,
        maxMaxBufferLength: 10
    });

    hlsActive.loadSource(ch.url);
    hlsActive.attachMedia(activeVideo);

    hlsActive.on(Hls.Events.MANIFEST_PARSED, ()=>{
        activeVideo.muted = false;
        activeVideo.play().catch(()=>{});

        preloadChannel(current + direction);
    });

    hlsActive.on(Hls.Events.ERROR,(event,data)=>{
        if(data.fatal) failover();
    });
}

// FAILOVER
function failover(){
    triedChannels.add(current);

    if(triedChannels.size >= channels.length){
        console.warn("Sin señal");
        return;
    }

    let next = current;

    do{
        next += direction;
        if(next < 0) next = channels.length - 1;
        if(next >= channels.length) next = 0;
    } while(triedChannels.has(next));

    loadChannel(next);
}

// swap
function swapVideos(){
    activeVideo.style.display = "none";
    standbyVideo.style.display = "block";
    [activeVideo, standbyVideo] = [standbyVideo, activeVideo];
}

// UI
function updateUI(){
    let ch = channels[current];

    if(ch.logo){
        logo.src = ch.logo;
        logo.style.display = "block";
    }

    document.querySelectorAll(".channel").forEach((el,i)=>{
        el.classList.toggle("active",i===current);
    });
}

// teclado
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp"){ direction=-1; loadChannel(current-1); }
    if(e.key==="ArrowDown"){ direction=1; loadChannel(current+1); }
});

</script>

</body>
</html>
